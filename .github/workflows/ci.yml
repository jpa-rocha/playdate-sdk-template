name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  nix-checks:
    name: Nix Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Run flake checks
        run: nix flake check

  formatting:
    name: Check Formatting
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Check formatting
        run: nix fmt -- --ci .

  lua-lint:
    name: Lua Linting
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Run luacheck
        run: nix develop --command luacheck .

      - name: Run selene
        run: nix develop --command selene .

  tests:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Run tests (if test directory exists)
        run: |
          if [ -d "spec" ] || [ -d "test" ] || [ -d "tests" ]; then
            nix develop --command test
          else
            echo "No test directory found, skipping tests"
          fi

  coverage:
    name: Test Coverage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Run coverage (if test directory exists)
        run: |
          if [ -d "spec" ] || [ -d "test" ] || [ -d "tests" ]; then
            nix develop --command coverage
          else
            echo "No test directory found, skipping coverage"
          fi

  semgrep:
    name: Semgrep Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Run Semgrep
        run: nix develop --command semgrep --config auto --error .

  osv-scan:
    name: Vulnerability Scan (OSV)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Run OSV Scanner
        run: |
          nix develop --command osv-scanner scan source --recursive . || {
            exit_code=$?
            # Exit code 128 = no package sources found (expected for pure Lua projects)
            if [ $exit_code -eq 128 ]; then
              echo "No package sources found, skipping vulnerability scan"
              exit 0
            fi
            exit $exit_code
          }
